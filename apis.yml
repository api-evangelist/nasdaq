apis:
  - name: Nasdaq Cloud Data Service (NCDS) — Kafka Streams
    description: >
      Real-time Nasdaq market data delivered over Apache Kafka (TLS) with
      SASL/OAUTHBEARER authentication against a Keycloak pro-realm token
      endpoint. Topics documented in the NCDS Java and Python SDKs:
      GIDS, NLSUTP, NLSCTA, NLSPLUS-UTP-V4, NLSPLUS-CTA-V4, NEWS-PRO-GLOBAL,
      UTPBIN-UF30. The full topic catalog is product-license-gated and
      delivered to subscribers during onboarding.
    humanURL: https://github.com/Nasdaq/NasdaqCloudDataService
    baseURL: https://streams.ncds.nasdaq.com:9094
